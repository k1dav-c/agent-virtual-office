table:
  name: api_keys
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - key_prefix
        - name
        - created_at
        - last_used_at
        - is_active
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
insert_permissions:
  - role: user
    permission:
      columns:
        - key_hash
        - key_prefix
        - name
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-user-id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - is_active
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
