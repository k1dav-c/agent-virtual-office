table:
  name: users
  schema: public
insert_permissions:
  - role: user
    permission:
      check:
        id:
          _eq: X-Hasura-User-Id
      set:
        id: x-hasura-user-id
      columns:
        - email
        - email_verified
        - name
        - given_name
        - family_name
        - nickname
        - picture
        - last_login
        - timezone
        - locale
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - date_joined
        - email
        - email_verified
        - family_name
        - given_name
        - id
        - is_admin
        - locale
        - name
        - nickname
        - picture
        - timezone
      filter:
        id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - email
        - email_verified
        - name
        - given_name
        - family_name
        - nickname
        - picture
        - last_login
        - timezone
        - locale
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
