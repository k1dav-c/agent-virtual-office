table:
  name: agent_sessions
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: api_key
    using:
      foreign_key_constraint_on: api_key_id
array_relationships:
  - name: logs
    using:
      foreign_key_constraint_on:
        column: session_id
        table:
          name: session_logs
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - session_id
        - role
        - status
        - summary
        - link
        - workspace
        - started_at
        - last_heartbeat_at
        - metadata
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
  - role: anonymous
    permission:
      columns:
        - id
        - role
        - status
        - summary
        - workspace
        - started_at
        - last_heartbeat_at
      filter: {}
    comment: "Public read for office view"
