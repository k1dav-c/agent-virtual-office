table:
  name: session_logs
  schema: public
object_relationships:
  - name: session
    using:
      foreign_key_constraint_on: session_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - session_id
        - summary
        - state
        - link
        - created_at
      filter:
        session:
          user_id:
            _eq: X-Hasura-User-Id
    comment: ""
